baseurl: https://wen910bing.top/
languageCode: en-us
theme: hugo-theme-stack
title: 温九拾冰的博客城堡
copyright: 温九拾冰

DefaultContentLanguage: zh-cn
hasCJKLanguage: true  # 开启中文支持

languages:
  zh-cn:
    languageName: 简体中文
    title: 温九拾冰的博客城堡
    weight: 1
    params:
      sidebar:
        subtitle: “我给你瘦落的街道、绝望的落日、荒郊的月亮。我给你一个久久地望着孤月的人的悲哀。”
        # ✅ 修正重点 1：在这里精准添加头像配置
        avatar:
          enabled: true
          local: true
          src: "/img/avatar.jpg" # 确保路径开头有斜杠，后缀是 .jpg
  en:
    languageName: English
    title: Example Site
    weight: 2
    params:
      sidebar:
        subtitle: Example description
        avatar:
          enabled: true
          local: true
          src: "/img/avatar.jpg"

pagination:
  pagerSize: 3

permalinks:
  post: /p/:slug/
  page: /:slug/

params:
  mainSections:
    - post
  featuredImageField: image # ✅ 修正重点 2：确保文章封面引用的是这个字段
  rssFullContent: true

  sidebar:
    emoji: 🍥
    avatar:
      enabled: true
      local: true
      src: "/img/avatar.jpg" # 修正全局路径

  article:
    math: false
    toc: true
    readingTime: true

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

# ... 后面的评论系统等配置保持不变即可