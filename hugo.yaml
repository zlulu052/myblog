baseurl: https://wen910bing.top/
languageCode: en-us
theme: hugo-theme-stack
title: 温九拾冰的博客城堡
copyright: 温九拾冰

# Theme i18n support
DefaultContentLanguage: zh-cn
hasCJKLanguage: true

languages:
  zh-cn:
    languageName: 简体中文
    title: 温九拾冰的博客城堡
    weight: 1
    params:
      sidebar:
        subtitle: “我给你瘦落的街道、绝望的落日、荒郊的月亮。我给你一个久久地望着孤月的人的悲哀。”
  en:
    languageName: English
    title: Example Site
    weight: 2
    params:
      sidebar:
        subtitle: Example description
        avatar:
          enabled: true
          local: false
          src: "/img/avatar.jpg"
  zh-tw:
    languageName: 正體中文
    title: 演示站點
    weight: 2
    params:
      sidebar:
        subtitle: 演示說明
  ja:
    languageName: 日本語
    title: サンプルサイト
    weight: 2
    params:
      sidebar:
        subtitle: サンプル説明
  ar:
    languageName: عربي
    languagedirection: rtl
    title: موقع تجريبي
    weight: 3
    params:
      sidebar:
        subtitle: وصف تجريبي

pagination:
  pagerSize: 3

permalinks:
  post: /p/:slug/
  page: /:slug/

params:
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: # e.g.: favicon placed in `static/favicon.ico` of your site folder, then set this field to `/favicon.ico` (`/` is necessary)

  footer:
    since: 2020
    customText:

  dateFormat:
    published: Jan 02, 2006
    lastUpdated: Jan 02, 2006 15:04 MST

  sidebar:
    emoji: 🍥
    subtitle: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    avatar:
      enabled: true
      local: true
      src: img/avatar.png

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: true
      default: Licensed under CC BY-NC-SA 4.0

  # --- 评论系统配置开始 ---
  comments:
    enabled: true
    provider: twikoo

    twikoo:
      # 👇 你的 Twikoo Vercel 地址 (已帮你改为 https)
      envId: "https://twikoo-comments-two.vercel.app"
      region: ""
      path: ""
      lang: "zh-CN"

    # 其他评论系统留空即可，不用管
    cactus:
      defaultHomeserverUrl: "https://matrix.cactus.chat:8448"
      serverName: "cactus.chat"
      siteName: ""
    giscus:
      repo:
      repoID:
      category:
      categoryID:
      mapping:
      lightTheme:
      darkTheme:
      reactionsEnabled: 1
      emitMetadata: 0
    gitalk:
      owner:
      admin:
      repo:
      clientID:
      clientSecret:
      proxy:
    cusdis:
      host:
      id:
  # --- 评论系统配置结束 ---

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc

  opengraph:
    twitter:
      # Your Twitter username
      site:
      # Available values: summary, summary_large_image
      card: summary_large_image

  defaultImage:
    opengraph:
      enabled: false
      local: false
      src:

  colorScheme:
    # Display toggle
    toggle: true
    # Available values: auto, light, dark
    default: auto

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

### Custom menu
menu:
  main: []
  social:
    - identifier: github
      name: GitHub
      url: https://github.com/CaiJimmy/hugo-theme-stack
      params:
        icon: brand-github
    - identifier: twitter
      name: Twitter
      url: https://twitter.com
      params:
        icon: brand-twitter

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

markup:
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
    renderer:
      ## Set to true if you have HTML content inside Markdown
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4
