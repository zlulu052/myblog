baseurl: https://wen910bing.top/
languageCode: en-us
theme: hugo-theme-stack
title: 温九拾冰的博客城堡
copyright: 温九拾冰

DefaultContentLanguage: zh-cn
hasCJKLanguage: true  # 开启中文支持

languages:
  zh-cn:
    languageName: 简体中文
    title: 温九拾冰的博客城堡
    weight: 1
    params:
      sidebar:
        subtitle: “我给你瘦落的街道、绝望的落日、荒郊的月亮。我给你一个久久地望着孤月的人的悲哀。”
        avatar:
          enabled: true
          local: false
          src: "/img/avatar.jpg"
  en:
    languageName: English
    title: Example Site
    weight: 2
    params:
      sidebar:
        subtitle: Example description
        avatar:
          enabled: true
          local: false
          src: "/img/avatar.jpg"

pagination:
  pagerSize: 20

permalinks:
  post: /p/:slug/
  page: /:slug/

params:
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true

  sidebar:
    emoji: 🏯 # 换成了更契合你主题的“城堡”图标
    avatar:
      enabled: true
      local: false
      src: "/img/avatar.jpg"

  article:
    math: false
    toc: true
    readingTime: true

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

  # --- 评论系统配置开始 ---
  comments:
    enabled: true
    provider: twikoo
    twikoo:
      envId: "https://twikoo-comments-two.vercel.app"
      lang: "zh-CN"
  # --- 评论系统配置结束 ---

# 👇 重点修改区域：干净清爽的侧边栏菜单与社交图标
menu:
  main:
    - identifier: home
      name: 主页
      url: /
      params:
        icon: home
      weight: 1

    - identifier: archives
      name: 归档
      url: /archives/
      params:
        icon: archives
      weight: 2

    - identifier: search
      name: 搜索
      url: /search/
      params:
        icon: search
      weight: 3

    - identifier: about
      name: 关于
      url: /about/
      params:
        icon: user
      weight: 4

    - identifier: links
      name: 友链
      url: /links/
      params:
        icon: link
      weight: 5

  social:
    - identifier: github
      name: GitHub
      url: https://github.com/zlulu052 # 已经替换为你的 GitHub 地址
      params:
        icon: brand-github